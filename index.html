<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>러셀 이동일지 작성</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
        /* 기존 스타일 유지 (팝업 관련 최소화) */
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; margin: 20px; background-color: #f4f7f6; }
        form { display: inline-block; text-align: left; border: 1px solid #e0e0e0; padding: 25px; width: 100%; max-width: 500px; background-color: #fff; border-radius: 12px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; }
        button { padding: 12px 20px; background-color: #336699; color: #fff; border: none; cursor: pointer; width: 100%; border-radius: 6px; font-weight: bold; }
        table { margin: 20px auto; border-collapse: collapse; width: 100%; max-width: 800px; background-color: #fff; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        thead { background-color: #336699; color: white; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 500px; background: white; border-radius: 12px; padding: 25px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .time-btn { padding: 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; margin: 4px; }
        .time-btn.selected { background: #336699; color: white; }
    </style>
</head>
<body>
    <h1>러셀 이동일지&교육점수 작성</h1>
    <form id="moveForm">
        <label>관 (본인):</label>
        <select id="building" required>
            <option value="">선택하세요</option>
            <option value="4-1관">4-1관</option><option value="4-2관">4-2관</option><option value="4-3관">4-3관</option><option value="4-4관">4-4관</option><option value="4-5관">4-5관</option>
        </select>
        <label>좌석번호 (본인):</label>
        <div style="display: flex; gap: 10px;">
            <select id="seatNumber" required><option value="">알파벳</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="F">F</option><option value="G">G</option><option value="H">H</option><option value="I">I</option><option value="J">J</option><option value="K">K</option></select>
            <select id="seatNumber2" required><option value="">번호</option><option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option></select>
        </div>
        <label>이동사유:</label>
        <select id="reason" required>
            <option value="">선택하세요</option>
            <optgroup label="담임 상담"><option value="상담 신청">상담 신청</option><option value="상담 취소">상담 취소</option></optgroup>
            <optgroup label="일반 이동"><option value="화장실/정수기">화장실/정수기</option><option value="튜터 질의응답">튜터 질의응답</option><option value="외부 학원/과외/보충">외부 학원/과외/보충</option><option value="식사">식사</option><option value="기타">기타</option></optgroup>
            <optgroup label="규정 위반"><option value="지각">지각</option><option value="입/퇴실 미준수">입/퇴실 미준수</option><option value="무단이탈">무단이탈</option><option value="핸드폰 미제출">핸드폰 미제출</option></optgroup>
        </select>
        <label>복귀교시:</label>
        <select id="returnTime" required><option value="">사유를 먼저 선택하세요</option></select>
        <div id="scoreDiv" style="display:none;"><label>점수:</label><select id="score"><option value="1">1점</option><option value="3">3점</option><option value="5">5점</option><option value="7">7점</option><option value="10">10점</option></select></div>
        <button type="submit">제출</button>
    </form>

    <div id="popupOverlay" class="popup-overlay"></div>
    <div id="counselingPopup" class="popup">
        <h2>👨‍🏫 상담 시간 선택</h2>
        <p>선생님: <span id="teacherNameDisp"></span></p>
        <input type="text" id="dateSelect" placeholder="날짜 선택" readonly>
        <div id="timeGrid" style="margin-top:15px;"></div>
        <button id="submitCounsel" style="margin-top:15px;">최종 확인</button>
    </div>

    <table id="moveList"><thead><tr><th>관</th><th>좌석</th><th>복귀</th><th>사유</th><th>날짜</th><th>시간</th><th>G열</th></tr></thead><tbody></tbody></table>

    <script>
    const SCRIPT_URL = "본인의_스크URL";
    let studentTeacherMap = {}, globalScheduleData = null, fpInstance = null;
    let selDate = "", selTime = "", isCancel = false;

    window.onload = () => {
        fetch(SCRIPT_URL + "?action=getGenderMap").then(r => r.json()).then(d => { studentTeacherMap = d.teacherMap; });
        const now = new Date();
        const timeToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
        setTimeout(() => location.reload(), timeToMidnight);
    };

    document.getElementById("reason").onchange = function() {
        const v = this.value;
        const scoreMap = {"지각":1, "입/퇴실 미준수":3, "무단이탈":10, "핸드폰 미제출":10};
        document.getElementById("scoreDiv").style.display = scoreMap[v] ? "block" : "none";
        if(scoreMap[v]) document.getElementById("score").value = scoreMap[v];
        document.getElementById("returnTime").innerHTML = v.includes("상담") ? '<option value="상담">팝업에서 선택</option>' : '<option value="1">1교시</option><option value="복귀안함">복귀안함</option>';
    };

    document.getElementById("moveForm").onsubmit = function(e) {
        e.preventDefault();
        const reas = document.getElementById("reason").value;
        const key = document.getElementById("building").value.replace("관","") + document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value;
        if(reas.includes("상담")) {
            isCancel = reas.includes("취소");
            const tName = studentTeacherMap[key];
            document.getElementById("teacherNameDisp").textContent = tName;
            document.getElementById("popupOverlay").style.display = "block";
            document.getElementById("counselingPopup").style.display = "block";
            fetch(`${SCRIPT_URL}?action=getTeacherSchedule&teacherName=${tName}`).then(r => r.json()).then(d => {
                globalScheduleData = d;
                if(fpInstance) fpInstance.destroy();
                fpInstance = flatpickr("#dateSelect", { locale:"ko", enable: d[1].slice(1), onChange: (sd, ds) => renderTimes(ds) });
            });
        } else {
            sendData();
        }
    };

    function renderTimes(ds) {
        selDate = ds;
        const col = globalScheduleData[1].indexOf(ds);
        const grid = document.getElementById("timeGrid"); grid.innerHTML = "";
        globalScheduleData.slice(2).forEach(row => {
            if((isCancel && row[col].includes("상담")) || (!isCancel && row[col] === "")) {
                const btn = document.createElement("button"); btn.className="time-btn"; btn.textContent = row[0].split("~")[0];
                btn.onclick = () => { selTime = btn.textContent; Array.from(grid.children).forEach(b=>b.classList.remove("selected")); btn.classList.add("selected"); };
                grid.appendChild(btn);
            }
        });
    }

    document.getElementById("submitCounsel").onclick = sendData;

    function sendData() {
        const reas = document.getElementById("reason").value;
        const data = {
            building: document.getElementById("building").value,
            seatNumber: document.getElementById("seatNumber").value + document.getElementById("seatNumber2").value,
            reason: reas,
            returnTime: reas.includes("상담") ? selTime : document.getElementById("returnTime").value,
            counselingDate: selDate,
            score: document.getElementById("score").value,
            targetSeat: document.getElementById("teacherNameDisp").textContent,
            inputDate: new Date().toISOString().split('T')[0],
            inputTime: new Date().toTimeString().split(' ')[0]
        };
        fetch(SCRIPT_URL, { method:"POST", body:JSON.stringify(data) }).then(r => r.text()).then(t => {
            if(t === "Duplicate") alert("중복 제출입니다.");
            else location.reload();
        });
    }
    </script>
</body>
</html>
